name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: backend

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install ".[dev]"
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install ".[dev]"
      - run: mypy app

  test:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: anava
          POSTGRES_PASSWORD: anava_test_password
          POSTGRES_DB: anava_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U anava -d anava_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ENVIRONMENT: test
      DATABASE_URL: postgresql+asyncpg://anava:anava_test_password@localhost:5432/anava_test
      REDIS_URL: redis://localhost:6379/0
      AUTH_MODE: local
      LOCAL_JWT_SECRET: ci-test-secret
      FILE_STORAGE_MODE: local
      LOCAL_FILE_STORAGE_PATH: ./.local_storage
      SQS_ENDPOINT_URL: http://localhost:9324
      AWS_REGION: ap-south-1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install ".[dev]"
      - name: Run alembic migrations
        run: alembic upgrade head
      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          tags: anava-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Dependency & secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan (deps + IaC)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: fs
          scan-ref: backend
          severity: HIGH,CRITICAL
          exit-code: "1"
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
