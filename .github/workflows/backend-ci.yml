name: backend-ci

on:
  push:
    branches: [main]
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]
  pull_request:
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]

defaults:
  run:
    working-directory: backend

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: anava
          POSTGRES_PASSWORD: anava_dev_password
          POSTGRES_DB: anava_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U anava -d anava_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy app

      - name: Run migrations against test DB
        env:
          DATABASE_URL: postgresql+asyncpg://anava:anava_dev_password@localhost:5432/anava_test
        run: alembic upgrade head

      - name: Unit + integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://anava:anava_dev_password@localhost:5432/anava_test
          REDIS_URL: redis://localhost:6379/0
        run: pytest --cov=app --cov-report=term-missing

  build-image:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t anava-backend:${{ github.sha }} .
      # ECR push / staging deploy step wired in at Development Plan Stage 16 —
      # requires AWS credentials in repo secrets, not needed for local dev.
